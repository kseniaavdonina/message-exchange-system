# ============================================================================
# nginx.conf - Конфигурация балансировщика нагрузки для системы РИТМ
# ============================================================================
# Описание:
#   - Балансировка HTTP-запросов между экземплярами приложения (app-1, app-2)
#   - Поддержка динамического масштабирования (новые контейнеры добавляются в upstream)
#   - Health check эндпоинт /instance-info для мониторинга
#   - Статусная страница Nginx для мониторинга производительности
# ============================================================================

# ========== ГЛОБАЛЬНЫЕ НАСТРОЙКИ ==========
events {
    worker_connections 1024;          # Максимум соединений на worker
    use epoll;                         # Использовать epoll (Linux)
    multi_accept on;                   # Принимать несколько соединений за раз
}

# ========== HTTP-СЕРВЕР ==========
http {
    # ========== БАЗОВЫЕ НАСТРОЙКИ ==========
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логирование
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Производительность
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 0;           # Без ограничения на размер загружаемых файлов

    # ========== АПСТРИМ (БАЛАНСИРОВКА) ==========
    upstream securemsg_backend {
        least_conn;                    # Алгоритм: наименьшее количество соединений

        # Основные контейнеры (всегда присутствуют)
        server securemsg-app-1:8081 max_fails=3 fail_timeout=30s;
        # server securemsg-app-2:8081 max_fails=3 fail_timeout=30s;

        # Динамически добавляемые контейнеры (app-3, app-4, ...)
        # Будут добавлены скейлером в runtime (необходимо перезагружать Nginx)
        # server securemsg-app-3:8081 max_fails=3 fail_timeout=30s;
        # server securemsg-app-4:8081 max_fails=3 fail_timeout=30s;

        keepalive 32;                  # Keepalive соединения к бэкендам
    }

    # ========== СЕРВЕР ==========
    server {
        listen 80;
        server_name localhost;

        # Основной location (все запросы)
        location / {
            proxy_pass http://securemsg_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Таймауты
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Административная панель
        location /admin/ {
            proxy_pass http://securemsg_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Эндпоинт информации об экземпляре (для скейлера)
        location /instance-info {
            proxy_pass http://securemsg_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Статусная страница Nginx (мониторинг)
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;           # Только с localhost
            allow 172.0.0.0/8;         # Docker-сеть
            deny all;
        }

        # Статические файлы (если нужно кешировать)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Обработка ошибок
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}