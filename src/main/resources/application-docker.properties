# ====== ????????? ???? ======
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ====== POSTGRESQL ======
spring.datasource.url=jdbc:postgresql://postgres:5432/securemsg_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ====== HIKARI CP (??? ??????????) ======
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# ====== JPA / HIBERNATE ======
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ====== ACTIVE MQ ======
spring.activemq.broker-url=tcp://activemq:61616
spring.activemq.user=admin
spring.activemq.password=admin
spring.activemq.packages.trust-all=true

# ====== MINIO (S3-?????????) ======
minio.url=http://minio:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin123
minio.bucket=securemsg-attachments

# ====== SERVER (TOMCAT) ======
server.port=8081
server.servlet.context-path=
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,application/json
server.tomcat.max-threads=10
server.tomcat.min-spare-threads=5
server.tomcat.max-connections=50
server.tomcat.accept-count=25

# ====== ??????????? ======
spring.jmx.enabled=false
spring.liveBeansView.enabled=false
spring.thymeleaf.cache=true
spring.mvc.async.request-timeout=30000

# ====== REDIS ======
spring.redis.host=redis
spring.redis.port=6379
spring.redis.timeout=5000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=2

# ====== ?????? ======
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.tracking-modes=cookie